[phases.setup]
aptPkgs = [
    "php8.3-pgsql",
    "php8.3-gd",
    "php8.3-zip",
    "php8.3-xml",
    "php8.3-mbstring",
    "php8.3-curl",
    "php8.3-bcmath",
    "php8.3-intl"
]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm install"
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache",
    "php artisan event:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link --force && php -S 0.0.0.0:$PORT -t public"
